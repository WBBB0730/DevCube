# tag 触发：Win + Mac 打包 → 挂到 GitHub Release
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Require tag commit on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Resolve release metadata
        id: meta
        run: pnpm exec tsx scripts/release-meta.ts "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Check
        run: pnpm check

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache electron-builder
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec electron-vite build

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          : "${CSC_LINK:?Missing MAC_CSC_LINK}"
          : "${CSC_KEY_PASSWORD:?Missing MAC_CSC_KEY_PASSWORD}"
          : "${APPLE_API_KEY_BASE64:?Missing APPLE_API_KEY}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER}"
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          trap 'rm -f "$key_path"' EXIT
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$key_path"
          chmod 600 "$key_path"
          if ! openssl pkey -in "$key_path" -noout >/dev/null 2>&1; then
            echo '::error::APPLE_API_KEY is not a valid PKCS#8 private key'
            exit 1
          fi
          export APPLE_API_KEY="$key_path"
          pnpm exec electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Verify macOS signature and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH="$(find dist -maxdepth 2 -type d -name '*.app' -print -quit)"
          : "${APP_PATH:?Packaged app not found}"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: pnpm exec electron-builder --win --publish never
        env:
          # 本轮不签名；显式关闭自动发现，避免空证书路径误伤
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error
          compression-level: 0

  release:
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        shell: bash
        run: |
          options=(--verify-tag --title "$GITHUB_REF_NAME" --notes '')
          if [[ "$PRERELEASE" == 'true' ]]; then
            options+=(--prerelease --latest=false)
          else
            options+=(--latest)
          fi
          gh release create "$GITHUB_REF_NAME" artifacts/* "${options[@]}"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.verify.outputs.prerelease }}
